name: Deploy Website to S3

on:
  push:
    branches:
      - main

# 1. הגדרת הרשאות חובה עבור ה-Token של GitHub (כדי להתחבר ל-AWS Role)
permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      # 2. שימוש בגרסה v4 העדכנית
      uses: aws-actions/configure-aws-credentials@v4
      with:
        # 3. כאן קורה הקסם: מתחברים באמצעות ה-Role ולא באמצעות מפתחות!
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        # 4. משיכת ה-Region מתוך ה-Secrets (לפי בקשת המרצה להסתיר פרטים)
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Deploy to S3
      # 5. שם הבאקט מוסתר ב-Secret
      run: aws s3 sync . s3://${{ secrets.AWS_S3_BUCKET }} --exclude ".github/*"
